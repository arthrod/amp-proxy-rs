  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Toolchain versions
        run: |
          cargo --version
          rustc --version

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Resolve binary path (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "BIN=target/release/amp-proxy" >> "$GITHUB_ENV"

      - name: Resolve binary path (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "BIN=target/release/amp-proxy.exe" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: amp-proxy-${{ matrix.os }}
          path: ${{ env.BIN }}
          if-no-files-found: error
